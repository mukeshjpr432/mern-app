apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: mukeshjpr432/mern-server:latest

          ports:
            - containerPort: 3000

          env:
            - name: PORT
              value: "3000"

            - name: BASE_API_URL
              value: "api"

            - name: CLIENT_URL
              value: "http://localhost"

            - name: JWT_SECRET
              value: "update_your_JWT_secret"

            - name: MONGO_URI
              value: "mongodb://mongodb-service:27017/mern_ecommerce"

---
apiVersion: v1
kind: Service

metadata:
  name: backend-service

spec:
  type: ClusterIP

  selector:
    app: backend

  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
